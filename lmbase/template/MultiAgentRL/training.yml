# =============================================================================
# TEMPLATE-TRAINING: Training Configuration Template
# =============================================================================
# Purpose:
#   Training hyperparameters and settings for multi-agent learning.
#
# Structure:
#   batch_size, num_epochs, gradient  - General settings for all agents
#   {AgentName}:                      - Per-agent settings (trainable, lora, lr)
#   rl:                               - RL-specific settings (optional)
#     reward, shaping
#
# Separation of Concerns:
#   - agents.yml:    Inference settings (model, generation, prompts)
#   - training.yml:  Training settings (batch/epoch, per-agent trainability, lora, lr)
#   - main.yml:      Experiment orchestration (data, environment, topology)
# =============================================================================

# =============================================================================
# General Training Settings
# =============================================================================
# These settings apply to all training paradigms (supervised, RL, etc.)
# =============================================================================

# Number of samples processed before gradient update
# For gradient accumulation: effective_batch_size = batch_size * accumulation_steps
batch_size: 1

# Number of passes over the entire dataset
num_epochs: 1

gradient:
  # Maximum gradient norm for clipping (prevents exploding gradients)
  max_grad_norm: 1.0

  # Number of steps to accumulate gradients before optimizer step
  # Use this to simulate larger batch sizes with limited memory
  accumulation_steps: 1

# =============================================================================
# Per-Agent Training Settings
# =============================================================================
# Each agent is keyed directly by its name at the top level.
# Include only agents that need training settings.
# Agent names are PLACEHOLDERS - replace with your actual agent names.
# =============================================================================
Agent_1:
  # Whether this agent's parameters are trainable
  trainable: true

  # Attach value head for RL methods (PPO, etc.)
  # Set true only when using RL with value function
  use_value_head: false

  # LoRA configuration for parameter-efficient fine-tuning
  # Remove this section entirely to use full fine-tuning instead
  lora:
    r: 8                    # LoRA rank (higher = more capacity)
    lora_alpha: 16          # Scaling factor (alpha/r determines effective LR)
    lora_dropout: 0.1       # Dropout rate for LoRA layers

  # Optimizer settings
  learning_rate: 1.0e-5     # Learning rate for optimizer

  # PPO-specific settings (uncomment if using PPO)
  # ppo:
  #   clip_ratio: 0.2       # PPO clipping parameter
  #   entropy_coef: 0.0     # Entropy bonus coefficient
  #   gamma: 0.99           # Discount factor
  #   lam: 0.95             # GAE lambda
  #   mini_batch_size: 4    # Mini-batch size for PPO updates
  #   ppo_epochs: 4         # Number of PPO epochs per iteration

# Agent_2 - Non-trainable example
# Include only agents that require explicit training configuration.
# Agents not listed here are assumed non-trainable by default.
# Agent_2:
#   trainable: false
#   use_value_head: false

# =============================================================================
# RL Settings (Optional)
# =============================================================================
# Uncomment and configure only when using reinforcement learning.
# =============================================================================
# rl:
#   reward:
#     accuracy_weight: 1.0       # Weight for accuracy-based reward
#     format_weight: 0.1         # Weight for format correctness reward
#
#   shaping:
#     enabled: false             # Enable dense reward signals
