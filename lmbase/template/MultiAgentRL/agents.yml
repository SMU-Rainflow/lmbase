# =============================================================================
# Agents Configuration Template
# =============================================================================
# Purpose:
#   Defines agent instances for multi-agent systems.
#   Contains ONLY INFERENCE-related settings.
#
# Architecture:
#   This file is a STRUCTURAL TEMPLATE - agent names are placeholders.
#   Replace agent identifiers (Agent_1, Agent_2) with your actual agent names.
#
# Agent Schema:
#   {AgentName}:                         # Unique agent identifier
#     name: "Display Name"              # Human-readable name (required)
#     class: "module.path:ClassName"    # Python class path (required)
#     num_instances: 1                  # Number of parallel instances (default: 1)
#     config:                           # Agent-specific configuration (required)
#       model:                          # Model settings
#         lm_type: "huggingface"        # "api", "huggingface", "vllm", "none"
#         lm_name: "model-id"           # Model identifier or path
#       inference_config: {...}         # Runtime settings (dtype, entropy)
#       generation_config: {...}        # Generation parameters
#       sys_message: "module:VAR"       # System prompt reference
#       user_message: "module:VAR"      # User prompt reference
#       latent_config: {...}            # Latent reasoning (optional, add when needed)
#
# Separation of Concerns:
#   - agents.yml:    Inference settings (model, generation, prompts)
#   - training.yml:  Training settings (trainable, lora, lr, epochs)
# =============================================================================

# =============================================================================
# Example Agent 1 - Complete Structure
# =============================================================================
# This shows the complete structure for a HuggingFace-based agent.
# Copy and modify for your specific agents. Replace "Agent_1" with your name.
# =============================================================================
Agent_1:
  name: "Agent_1"
  class: "your.module.path:YourAgentClass"
  num_instances: 1
  
  config:
    # -------------------------------------------------------------------------
    # Model Configuration
    # -------------------------------------------------------------------------
    model:
      lm_type: "huggingface"
      lm_name: "Qwen/Qwen2.5-0.5B-Instruct"
    
    # -------------------------------------------------------------------------
    # Inference Configuration
    # -------------------------------------------------------------------------
    # Runtime settings for model inference.
    # Note: Device is configured in main.yml environment.device_map.
    # -------------------------------------------------------------------------
    inference_config:
      torch_dtype: "auto"      # "float32", "float16", "bfloat16", "auto"
      
      # Entropy computation (optional, for analysis purposes)
      entropy_config:
        topk_v: inf            # Top-k for entropy (inf = all tokens)
        topk_adaptive: false   # Adaptive top-k selection
        temperature: 0.0       # Temperature for entropy calculation
    
    # -------------------------------------------------------------------------
    # Generation Configuration
    # -------------------------------------------------------------------------
    # Parameters passed to model.generate() or equivalent API calls
    # -------------------------------------------------------------------------
    generation_config:
      max_new_tokens: 128      # Maximum tokens to generate
      temperature: 0.7         # Sampling temperature (higher = more random)
      top_p: 0.9               # Nucleus sampling threshold
      do_sample: true          # Enable sampling (false = greedy)
    
    # -------------------------------------------------------------------------
    # Prompt Configuration
    # -------------------------------------------------------------------------
    # References to prompt templates. Format: "module.path:VARIABLE_NAME"
    # -------------------------------------------------------------------------
    sys_message: "your.module:SYS_PROMPT"
    user_message: "your.module:USER_PROMPT"
    
    # -------------------------------------------------------------------------
    # Latent Reasoning Configuration (Optional - add when needed)
    # -------------------------------------------------------------------------
    # Enable for latent chain-of-thought reasoning methods.
    # Uncomment and configure below only if your model/method supports it.
    # -------------------------------------------------------------------------
    # latent_config:
    #   latent_steps: 0          # Number of latent steps (> 0 to enable)
    #   tail_truncate_n: 0       # Keep N tokens from end
    #   head_truncate_n: 0       # Keep N tokens from beginning
    #   truncate_mode: "target"  # Truncation strategy
    #   add_think: false         # Add special think tokens

# =============================================================================
# Example Agent 2 - Complete Structure (API-based)
# =============================================================================
# Shows complete structure for an API-based agent.
# Copy and modify for your specific agents. Replace "Agent_2" with your name.
# =============================================================================
Agent_2:
  name: "Agent_2"
  class: "your.module.path:YourAgentClass"
  num_instances: 1
  
  config:
    # -------------------------------------------------------------------------
    # Model Configuration
    # -------------------------------------------------------------------------
    model:
      lm_type: "api"         # API-based model (OpenAI, Anthropic, etc.)
      lm_name: "gpt-4"
    
    # -------------------------------------------------------------------------
    # Inference Configuration
    # -------------------------------------------------------------------------
    # Note: For API-based models, device/torch_dtype/entropy_config are not
    # applicable. Omit inference_config entirely for API agents, or configure
    # only the fields relevant to your API client.
    # -------------------------------------------------------------------------
    # inference_config:  # Uncomment and add fields if your API client needs them
    
    # -------------------------------------------------------------------------
    # Generation Configuration
    # -------------------------------------------------------------------------
    generation_config:
      max_new_tokens: 256
      temperature: 0.7
      top_p: 0.9
      # do_sample: not applicable for API models; omit or replace with API-specific params
    
    # -------------------------------------------------------------------------
    # Prompt Configuration
    # -------------------------------------------------------------------------
    sys_message: "your.module:SYS_PROMPT"
    user_message: "your.module:USER_PROMPT"
    
    # -------------------------------------------------------------------------
    # Latent Reasoning Configuration (Optional - add when needed)
    # -------------------------------------------------------------------------
    # For API models, latent reasoning is typically not applicable.
    # Uncomment and configure below only if your model/method supports it.
    # -------------------------------------------------------------------------
    # latent_config:
    #   latent_steps: 0
    #   tail_truncate_n: 0
    #   head_truncate_n: 0
    #   truncate_mode: "target"
    #   add_think: false
