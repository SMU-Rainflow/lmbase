# =============================================================================
# [SCENARIO_NAME]LLM Simulation Configuration (LLM-Based)
# =============================================================================
# Template for LLM-driven financial simulations.
# Reference: AssetBubbleLLM/, HerdEffectLLM/
#
# LLM Provider: ByteDance Doubao (via lmbase)
# Environment Variable: ARK_API_KEY
#
# Usage:
#   python examples/[SCENARIO_NAME]LLM/run_[scenario]_llm.py -c configs/[SCENARIO_NAME]LLM/simulation.yml
# =============================================================================

# -----------------------------------------------------------------------------
# Simulation Settings
# -----------------------------------------------------------------------------
setting:
  # Unique identifier for this simulation run (used in actor names and log messages)
  name: "[scenario_name]_llm_simulation"
  # Human-readable description (informational only, not used by framework)
  description: "[Description of the LLM-based simulation]"
  # Total number of rounds to execute. The loop in GeneralSimulator.run() iterates
  # range(1, total_rounds+1). Simulation stops exactly at this count.
  # LLM simulations typically use fewer rounds (50-100) due to API latency.
  total_rounds: 100
  # Max round results kept in hot RAM (HistoryBuffer hot deque).
  # Round results beyond this limit are spilled to disk under record_path/history/.
  # simulator.run() returns only these hot entries — NOT all round results.
  # Rule of thumb: keep at 3 (enough for last-N-round analysis without RAM pressure).
  round_history_limit: 3
  # Root directory for all output artifacts (records, diagrams, history, checkpoints).
  # Must be consistent with extras.record_path in players.yml and proxy paths in persona.yml.
  record_path: "EXPERIMENT/[SCENARIO_NAME]LLM/records"
  # Save topology diagram every N rounds (0 = disabled).
  # Diagrams written to record_path/diagrams/. High frequency increases I/O overhead.
  # NOTE: Rendering is automatically skipped when topology structure is unchanged —
  # for static topologies only 1 diagram is ever written regardless of this value.
  # For large-scale runs (N > 100 players), set to 0 to disable entirely.
  save_diagram_interval: 20

# -----------------------------------------------------------------------------
# Environment Configuration
# -----------------------------------------------------------------------------
environment:
  # Path to .env file containing API keys (loaded via python-dotenv).
  # Must contain ARK_API_KEY for ByteDance Doubao LLM API access.
  dotenv_path: .env
  # Working directory for all relative paths in this config.
  # "." means the project root (where you run the python command from).
  workspace: "."

# -----------------------------------------------------------------------------
# Ray Configuration (Distributed Computing)
# -----------------------------------------------------------------------------
#
# RESOURCE SIZING PROTOCOL (mandatory for every new scenario):
#   Only object_store_memory needs to be computed per-scenario.
#   num_cpus = null always (actors declare num_cpus=0, so the value is irrelevant).
#
#   object_store_memory — WHAT IT IS:
#     This is NOT per-actor memory. It is ONE cluster-wide shared memory pool
#     (Ray Plasma store, mmap'd shared memory) that holds only the objects
#     crossing actor boundaries via ray.get() / ray.put(). Each actor's private
#     heap (custom_state, HistoryBuffer hot deque, all Python variables) lives
#     entirely outside this pool and is NOT counted or limited here.
#     Objects are freed from the store as soon as ray.get() returns — they only
#     live here transiently while being transferred between actors.
#
#   object_store_memory derivation (read masim/simulator/general.py phases 2-3):
#     Per round, the following objects enter the store and are freed after each phase:
#       Phase 2 (COLLECT):   N_players TurnResult objects  (~600 B actual each)
#       Phase 3 (DISPATCH):  N_players pending_info lists  (~300 B actual each)
#                            N_messages Message objects    (~400 B actual each)
#     Ray minimum allocation = 64 KB per object regardless of actual size.
#     Peak simultaneous bytes in store = (N_players*2 + N_messages) * 64 KB.
#     Set object_store_memory = peak_bytes * 10 (10x headroom), minimum 128 MB.
#     LLM simulations also pass full prompt/response strings (~4-8 KB each) through
#     TurnResult. Add N_players * avg_prompt_bytes to actual payload, then apply
#     64 KB floor per object. LLM cap should be at least 512 MB.
#     Write the concrete integer (bytes) directly — do NOT use null.
#
# -----------------------------------------------------------------------------
ray:
  # Ray cluster address (null = start local cluster)
  address: null
  # Ray namespace for actor isolation between experiments
  namespace: "[scenario_name]_llm"
  # Actor name prefix (null = auto)
  actor_prefix: null
  # null = Ray auto-detects from machine.
  # All actors in this framework use num_cpus=0 (async, I/O-bound via asyncio).
  # No actor ever declares a CPU resource requirement, so this value has no
  # scheduling effect. Set to null to avoid stale hardcoded values.
  num_cpus: null
  # GPU count (null = none — LLM inference runs server-side via API)
  num_gpus: null
  # [FILL IN] ONE shared Plasma pool (NOT per-actor). Holds only cross-actor objects during ray.get().
  # Actor heap (custom_state, HistoryBuffer, etc.) is separate and NOT counted here.
  # Formula: (N_players*2 + N_messages) * 64KB * 10 + LLM prompt overhead; minimum 512 MB.
  # LLM overhead: N_players * avg_prompt_size (typ. 4-8 KB each via TurnResult payload).
  # Example: 6 players, 10 messages, 6KB avg prompt -> peak ~22 MB -> floor to 512 MB.
  object_store_memory: 536870912
  # Enable Ray dashboard UI
  include_dashboard: false
  # Ray internal logging level
  logging_level: "warning"
  # Forward Ray logs to driver process stdout
  log_to_driver: false
  actor_options:
    # How many times Ray will automatically restart a crashed actor before giving up.
    # Covers unexpected actor death (OOM, segfault, node failure).
    # 3 = tolerate up to 3 crashes per actor; set 0 to disable auto-restart.
    max_restarts: 3
    # How many times Ray will automatically retry a failed remote task call.
    # Covers transient errors (timeout, network blip). Does NOT cover actor crashes.
    # 1 = retry once before propagating the exception to the caller.
    max_task_retries: 1
    # Max number of tasks queued + executing concurrently inside one actor.
    # Each PlayerPersona actor is single-threaded (asyncio). Ray queues excess tasks.
    # LLM simulations: set to 10 — LLM API calls are I/O-bound (waiting for HTTP response).
    # While one operate() awaits the LLM API, other queued admin calls can be processed.
    # Higher value reduces head-of-line blocking without increasing CPU usage.
    # NOTE: This field is currently reserved in config but not yet wired into
    # RemotePlayerPersona.options() in masim/simulator/general.py line 298.
    max_concurrency: 10
  runtime_env:
    # Override working directory for all actor subprocesses (null = inherit workspace).
    # Use when running actors on remote nodes with different filesystem layouts.
    working_dir: null
    # Extra pip packages to install in actor runtime environment.
    # Useful when running on remote Ray clusters that lack certain dependencies.
    pip: []
    # Extra environment variables injected into each actor process.
    # Example: {ARK_API_KEY: "sk-..."} injects LLM API key directly (prefer .env instead).
    env_vars: {}
  serialization:
    # Use Apache Arrow IPC format for Ray object serialization (faster than pickle).
    # Keep true unless you have objects that Arrow cannot serialize.
    use_arrow: true
    # Register custom pickle serializers for framework domain objects
    # (TurnResult, Message, Info, etc.) via masim.utils.serialization.
    # Keep true to ensure correct deserialization across Ray actor boundaries.
    register_custom_serializers: true

# -----------------------------------------------------------------------------
# Players Configuration (imported from players.yml)
# -----------------------------------------------------------------------------
players: !include players.yml

# -----------------------------------------------------------------------------
# Topology Configuration (imported from topology.yml)
# -----------------------------------------------------------------------------
topology: !include topology.yml

# -----------------------------------------------------------------------------
# Communication Configuration
# -----------------------------------------------------------------------------
communication:
  storage_path: "EXPERIMENT/[SCENARIO_NAME]LLM/communication"
  # Whether to persist encoded messages to disk for debugging/replay.
  # Set to false for large-scale runs (N > ~100 players) to avoid high write volume.
  record_messages: true
  # Number of messages batched per block file by BlockBasedStoreManager.
  # Higher value = fewer files on disk. 500 is sufficient for most scenarios.
  message_block_size: 500
